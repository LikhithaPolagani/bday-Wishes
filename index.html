<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday! 🎉</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a8edea, #fed6e3);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
      position: relative;
    }

    .container {
      text-align: center;
      color: white;
      text-shadow: 0 0 25px rgba(0,0,0,0.4);
      z-index: 10;
    }

    h1 {
      font-size: 5.5rem;
      margin: 10px 0;
      animation: glow 2s ease-in-out infinite alternate;
      letter-spacing: 4px;
    }

    .subtitle {
      font-size: 2.2rem;
      margin: 10px 0 30px 0;
      opacity: 0.95;
    }

    .name {
      font-size: 4rem;
      color: #fff;
      font-weight: bold;
      animation: bounce 2.5s infinite;
      margin: 15px 0;
      text-shadow: 0 0 30px #ff00ff;
    }

    .cake {
      font-size: 8rem;
      margin: 20px 0;
      animation: shake 3s infinite, spin 20s linear infinite;
      filter: drop-shadow(0 0 20px rgba(255,255,255,0.8));
    }

    button {
      margin-top: 40px;
      padding: 18px 50px;
      font-size: 1.8rem;
      background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 15px 30px rgba(255,107,107,0.4);
      transition: all 0.4s;
    }

    button:hover {
      transform: scale(1.15) rotate(5deg);
      background: linear-gradient(45deg, #ff5252, #ff6b6b);
    }

    .balloons {
      position: absolute;
      top: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .hearts {
      position: absolute;
      top: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 2;
    }

    /* Animations */
    @keyframes glow {
      from { text-shadow: 0 0 15px #fff, 0 0 30px #ff69b4, 0 0 45px #ff1493; }
      to { text-shadow: 0 0 25px #fff, 0 0 40px #ff69b4, 0 0 60px #ff1493; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-25px) scale(1.05); }
    }

    @keyframes shake {
      0%, 100% { transform: rotate(-8deg); }
      50% { transform: rotate(8deg); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .sparkles {
      position: absolute;
      color: gold;
      font-size: 1.5rem;
      animation: sparkle 1.5s infinite;
      z-index: 5;
    }
  </style>
</head>
<body>

  <div class="balloons"></div>
  <div class="hearts"></div>

  <div class="container">
    <div class="cake">🎂</div>
    <h1>Happy Birthday!</h1>
    <p class="subtitle">To the most amazing person</p>
    <p class="name">My beloved one 🎉</p>
    
    <p style="font-size: 2.1rem; margin: 25px 0;">May your day be filled with endless love, laughter, joy, and lots of cake! 🍰✨</p>
    <p style="font-size: 1.9rem;">Wishing you a magical year filled with beautiful moments and all your dreams coming true 💖</p>

    <button onclick="makeWish()">Click to see Secret Wish✨</button>
  </div>

  <script>
    // Create floating balloons
    function createBalloons() {
      const balloonEmojis = ['🎈', '🎈', '❤️', '💕', '🎉'];
      for (let i = 0; i < 45; i++) {
        const balloon = document.createElement('div');
        balloon.textContent = balloonEmojis[Math.floor(Math.random() * balloonEmojis.length)];
        balloon.style.position = 'absolute';
        balloon.style.fontSize = (Math.random() * 2.5 + 2.5) + 'rem';
        balloon.style.left = Math.random() * 100 + 'vw';
        balloon.style.top = '110vh';
        balloon.style.opacity = Math.random() * 0.6 + 0.4;
        balloon.style.animation = `float ${Math.random() * 10 + 10}s linear infinite`;
        balloon.style.animationDelay = `-${Math.random() * 15}s`;
        document.querySelector('.balloons').appendChild(balloon);
      }
    }

    // Create floating hearts
    function createHearts() {
      for (let i = 0; i < 25; i++) {
        const heart = document.createElement('div');
        heart.textContent = '💖';
        heart.style.position = 'absolute';
        heart.style.fontSize = (Math.random() * 1.8 + 1.5) + 'rem';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.top = '100vh';
        heart.style.opacity = Math.random() * 0.7 + 0.3;
        heart.style.animation = `floatHeart ${Math.random() * 12 + 12}s linear infinite`;
        heart.style.animationDelay = `-${Math.random() * 20}s`;
        document.querySelector('.hearts').appendChild(heart);
      }
    }

    // Add floating animations
    const style = document.createElement('style');
    style.innerHTML = `
      @keyframes float {
        0% { transform: translateY(110vh) rotate(0deg); }
        100% { transform: translateY(-120vh) rotate(360deg); }
      }
      @keyframes floatHeart {
        0% { transform: translateY(100vh) scale(0.5); }
        100% { transform: translateY(-150vh) scale(1.2); }
      }
      @keyframes sparkle {
        0%, 100% { opacity: 0.3; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.3); }
      }
    `;
    document.head.appendChild(style);

    // Confetti + Sparkles on button click
    function makeWish() {
      alert("🎉 Your special wish has been sent straight to the stars! ✨\n\nMay all your dreams come true, My Beloved One! 💕");

      // Confetti
      for (let i = 0; i < 80; i++) {
        setTimeout(() => {
          const confetti = document.createElement('div');
          confetti.textContent = ['🎉', '✨', '🎊', '💖', '🌟'][Math.floor(Math.random()*5)];
          confetti.style.position = 'fixed';
          confetti.style.left = Math.random() * 100 + 'vw';
          confetti.style.top = '-50px';
          confetti.style.fontSize = (Math.random() * 1.5 + 2) + 'rem';
          confetti.style.zIndex = '1000';
          confetti.style.animation = 'confettiFall 3.5s linear forwards';
          document.body.appendChild(confetti);

          setTimeout(() => confetti.remove(), 4000);
        }, i * 30);
      }

      // Extra sparkles
      for (let i = 0; i < 30; i++) {
        setTimeout(() => {
          const sparkle = document.createElement('div');
          sparkle.className = 'sparkles';
          sparkle.textContent = '✨';
          sparkle.style.left = Math.random() * 100 + 'vw';
          sparkle.style.top = Math.random() * 100 + 'vh';
          document.body.appendChild(sparkle);
          setTimeout(() => sparkle.remove(), 2000);
        }, i * 40);
      }
    }

    // Add confetti animation
    const confettiStyle = document.createElement('style');
    confettiStyle.innerHTML = `
      @keyframes confettiFall {
        0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
        100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
      }
    `;
    document.head.appendChild(confettiStyle);

    // Initialize everything
    window.onload = () => {
      createBalloons();
      createHearts();
      
      // Add random sparkles every few seconds
      setInterval(() => {
        if (Math.random() > 0.6) {
          const sparkle = document.createElement('div');
          sparkle.className = 'sparkles';
          sparkle.textContent = ['✨','⭐','💫'][Math.floor(Math.random()*3)];
          sparkle.style.left = Math.random() * 100 + 'vw';
          sparkle.style.top = Math.random() * 80 + 'vh';
          document.body.appendChild(sparkle);
          setTimeout(() => sparkle.remove(), 1800);
        }
      }, 800);
    };
  </script>
</body>
</html>
